version: '3.8'

services:
  # Lightweight Flask Web Application
  # Connects to the Kafka broker running on GCP (not a local Kafka)
  lightweight-app:
    build:
      context: ./lightweight-app
      dockerfile: Dockerfile
    container_name: ieee-search-engine-app
    ports:
      - "5001:5000"
    env_file:
      - ./lightweight-app/.env
    environment:
      - FLASK_SECRET_KEY=ieee-search-engine-secret-key-2025
      - KAFKA_TIMEOUT=300
      - PORT=5000
    restart: unless-stopped

