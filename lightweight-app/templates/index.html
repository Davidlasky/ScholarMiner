{% extends "base.html" %}

{% block content %}
<div class="main-content">
    <h1>Enter Google Scholar Search URL</h1>

    <form action="{{ url_for('load_engine') }}" method="POST" onsubmit="showLoading()">
        <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <input
                type="text"
                name="scholar_url"
                class="input-field"
                placeholder="Paste your Google Scholar search URL here!"
                required
            >
            <button type="submit" class="btn btn-large">Index Papers from this URL</button>
        </div>
    </form>
</div>
{% endblock %}
