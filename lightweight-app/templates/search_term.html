{% extends "base.html" %}

{% block content %}
<div class="main-content">
    <h1>Enter Your Search Term</h1>

    <form action="{{ url_for('search_term') }}" method="POST" onsubmit="showLoading()">
        <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <input
                type="text"
                name="search_term"
                class="input-field"
                placeholder="Type your search term here!"
                required
            >
            <button type="submit" class="btn btn-large">Search</button>
        </div>
    </form>
</div>
{% endblock %}
