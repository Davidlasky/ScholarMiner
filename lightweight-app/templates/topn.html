{% extends "base.html" %}

{% block content %}
<div class="main-content">
    <h1>Enter Number of Frequent Terms</h1>

    <form action="{{ url_for('top_n') }}" method="POST" onsubmit="showLoading()">
        <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <input
                type="number"
                name="n"
                class="input-field"
                placeholder="Type number of frequent terms here!"
                min="1"
                required
            >
            <button type="submit" class="btn btn-large">Find</button>
        </div>
    </form>
</div>
{% endblock %}
